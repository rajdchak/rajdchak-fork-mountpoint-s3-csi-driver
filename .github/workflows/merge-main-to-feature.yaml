name: Merge main to feature branch

on:
  schedule:
    # Runs bi-weekly on the 1st and 15th of each month at 9:00 UTC
    - cron: '0 9 1,15 * *'
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write
  pull-requests: write

jobs:
  merge-main-to-feature:
    runs-on: ubuntu-latest
    env:
      FEATURE_BRANCH: feature/daemonset-architecture
      BASE_BRANCH: main

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ env.FEATURE_BRANCH }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Fetch latest main
        run: |
          git fetch origin ${{ env.BASE_BRANCH }}

      - name: Check if main has new commits
        id: check
        run: |
          MERGE_BASE=$(git merge-base HEAD origin/${{ env.BASE_BRANCH }})
          MAIN_HEAD=$(git rev-parse origin/${{ env.BASE_BRANCH }})
          if [ "$MERGE_BASE" = "$MAIN_HEAD" ]; then
            echo "up_to_date=true" >> "$GITHUB_OUTPUT"
          else
            echo "up_to_date=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Skip if already up to date
        if: steps.check.outputs.up_to_date == 'true'
        run: echo "Feature branch is already up to date with main. Nothing to do."

      - name: Attempt merge
        if: steps.check.outputs.up_to_date == 'false'
        id: merge
        run: |
          if git merge origin/${{ env.BASE_BRANCH }} --no-edit; then
            echo "conflict=false" >> "$GITHUB_OUTPUT"
          else
            git merge --abort
            echo "conflict=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Push merge and create PR (no conflicts)
        if: steps.check.outputs.up_to_date == 'false' && steps.merge.outputs.conflict == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          MERGE_BRANCH="auto/merge-main-to-feature-$(date +%Y%m%d)"
          git checkout -b "$MERGE_BRANCH"
          git push origin "$MERGE_BRANCH"

          gh pr create \
            --base "${{ env.FEATURE_BRANCH }}" \
            --head "$MERGE_BRANCH" \
            --title "chore: merge main into feature/daemonset-architecture" \
            --body "## ✅ Clean Merge from \`main\`

          This is an automated bi-weekly merge of \`main\` into \`feature/daemonset-architecture\`.

          No conflicts were detected. Please review and merge.

          ---
          *This PR was created automatically by the bi-weekly merge workflow.*"

      - name: Create branch and PR (conflicts detected)
        if: steps.check.outputs.up_to_date == 'false' && steps.merge.outputs.conflict == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          MERGE_BRANCH="auto/merge-main-to-feature-$(date +%Y%m%d)"
          git checkout -b "$MERGE_BRANCH"
          git push origin "$MERGE_BRANCH"

          gh pr create \
            --base "${{ env.FEATURE_BRANCH }}" \
            --head "$MERGE_BRANCH" \
            --title "chore: merge main into feature/daemonset-architecture (conflicts)" \
            --body "## ⚠️ Merge Conflicts Detected

          This automated bi-weekly merge of \`main\` into \`feature/daemonset-architecture\` encountered conflicts.

          ### Action Required
          1. Check out this branch locally:
             \`\`\`bash
             git fetch origin
             git checkout $MERGE_BRANCH
             \`\`\`
          2. Merge main and resolve conflicts:
             \`\`\`bash
             git merge origin/main
             # Resolve conflicts in your editor
             git add .
             git commit
             git push
             \`\`\`
          3. Once resolved, merge this PR into \`feature/daemonset-architecture\`

          ---
          *This PR was created automatically by the bi-weekly merge workflow.*" \
            --label "merge-conflict"
