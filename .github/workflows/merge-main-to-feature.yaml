name: Merge main to feature branch

on:
  schedule:
    # Runs bi-weekly on Monday at 9:00 UTC (every 2 weeks)
    - cron: '0 9 1,15 * *'
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write
  pull-requests: write

jobs:
  merge-main-to-feature:
    runs-on: ubuntu-latest
    env:
      FEATURE_BRANCH: feature/daemonset-architecture
      BASE_BRANCH: main

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ env.FEATURE_BRANCH }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Fetch latest main
        run: |
          git fetch origin ${{ env.BASE_BRANCH }}

      - name: Attempt merge
        id: merge
        run: |
          if git merge origin/${{ env.BASE_BRANCH }} --no-edit; then
            echo "conflict=false" >> "$GITHUB_OUTPUT"
          else
            git merge --abort
            echo "conflict=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Push merged changes (no conflicts)
        if: steps.merge.outputs.conflict == 'false'
        run: |
          # Check if there are new commits from the merge
          if git diff --quiet HEAD origin/${{ env.FEATURE_BRANCH }}; then
            echo "No new changes to merge. Feature branch is up to date."
          else
            git push origin ${{ env.FEATURE_BRANCH }}
            echo "Successfully merged main into feature branch."
          fi

      - name: Create merge branch and PR (conflicts detected)
        if: steps.merge.outputs.conflict == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          MERGE_BRANCH="auto/merge-main-to-feature-$(date +%Y%m%d)"

          # Create a new branch from the feature branch
          git checkout -b "$MERGE_BRANCH"
          git push origin "$MERGE_BRANCH"

          # Create a PR with conflict information
          PR_BODY=$(cat <<'EOF'
          ## ⚠️ Merge Conflicts Detected

          This automated bi-weekly merge of `main` into `feature/daemonset-architecture` encountered conflicts.

          ### Action Required
          1. Check out this branch locally
          2. Merge `main` and resolve conflicts manually:
             ```bash
             git checkout $MERGE_BRANCH
             git merge origin/main
             # Resolve conflicts
             git add .
             git commit
             git push
             ```
          3. Once resolved, merge this PR into `feature/daemonset-architecture`

          ---
          *This PR was created automatically by the bi-weekly merge workflow.*
          EOF
          )

          gh pr create \
            --base "${{ env.FEATURE_BRANCH }}" \
            --head "$MERGE_BRANCH" \
            --title "chore: merge main into feature/daemonset-architecture (conflicts)" \
            --body "$PR_BODY"
